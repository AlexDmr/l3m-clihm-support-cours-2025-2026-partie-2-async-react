<mat-toolbar color="primary">
  <span>Support cours 2025-2026 observables et promesses</span>
  <span class="toolbar-spacer"></span>
  <button mat-icon-button [matMenuTriggerFor]="pagesMenu" aria-label="Ouvrir le menu des pages">
    <mat-icon>menu</mat-icon>
  </button>
</mat-toolbar>

<mat-menu #pagesMenu="matMenu">
  @for (page of pages; track page.route) {
    <a mat-menu-item [routerLink]="page.route">{{ page.label }}</a>
  }
</mat-menu>

<main>
  <router-outlet />
</main>
